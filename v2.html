<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Background</title>

  <style>
    body {
      margin: 0;
      height: 100vh;

      /* TWO BACKGROUNDS */
      background-image:
        url("testing.png"),
        url("background.png");

      background-size: cover, cover;
      background-position: center, center;
      background-repeat: no-repeat, no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;

      position: relative;
      overflow: hidden;
    }

    .content {
      text-align: center;
      text-shadow: 0 2px 5px rgba(0,0,0,0.7);
      z-index: 2;
    }

    /* CLOCK OVERLAY */
    #clock {
      position: absolute;
      top: 130px;
      right: 970px;

      font-size: 1.4rem;
      #font-weight: 900;
      #olor: #ffe88a;

      padding: 6px 10px;
      border-radius: 10px;

      text-shadow: 2px 2px 2px rgba(0,0,0,0.6);
      z-index: 5;
      white-space: nowrap;
    }


        .clock-img {
      width: 520px;
      height: 165px;
      position: absolute;
      top: 23px;
      right: 625px;}

  </style>
</head>

<body>

  <div id="clock"></div>
          <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fwww.fandom.com%2Fbrand%2Fimages%2FTV-Guide_Logo_Family-Brands_1-p-3200.png&f=1&nofb=1&ipt=10d7c206e9bd996071105821925c3c6f77b22999e5585350b27728e73509dcc9" alt="icon" class="clock-img">
  <div class="content">
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      let m = now.getMinutes().toString().padStart(2, '0');

      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;

      document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
